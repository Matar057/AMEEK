{% extends 'base.html' %}

{% block title %}Modifier mon profil - Amicale{% endblock %}

{% block content %}
<div class="flex flex-wrap justify-center">
  <div class="w-full md:w-1/2 px-2">
    <div class="bg-white rounded-xl shadow-md">
      <div class="p-4">
        <h3 class="text-xl font-bold mb-4">Modifier mon profil</h3>
        <form method="post">
          {% csrf_token %}
          {% for field in form %}
            <div class="mb-4">
              <label class="block text-gray-700 font-medium mb-1">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <p class="text-red-500 text-sm mt-1">{{ field.errors.0 }}</p>
              {% endif %}
            </div>
          {% endfor %}
          <div class="flex gap-2 mt-3">
            <button type="submit" class="bg-amicale text-white px-4 py-2 rounded-lg font-medium hover:bg-amicale-fonce transition">Enregistrer</button>
            <a href="{% url 'accounts:profile' %}" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg">Annuler</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
