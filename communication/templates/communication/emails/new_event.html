<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;font-family:Arial,sans-serif;background:#f5f5f5">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;margin:20px auto;background:#fff;border-radius:8px;overflow:hidden">
    <tr>
      <td style="background:linear-gradient(135deg,#FF7F00,#CC5500);padding:20px;text-align:center">
        <h1 style="color:#fff;margin:0;font-size:22px">AMEEK</h1>
      </td>
    </tr>
    <tr>
      <td style="padding:24px">
        <p>Bonjour{% if prenom %} {{ prenom }}{% endif %},</p>
        <p>Un nouvel événement a été ajouté :</p>
        <table style="background:#FFF8F0;border:1px solid #FFE0B2;border-radius:6px;padding:16px;margin:16px 0;width:100%">
          <tr><td style="font-size:16px;color:#333"><strong>{{ titre }}</strong></td></tr>
          <tr><td style="font-size:14px;color:#555;padding-top:8px">{{ description|linebreaksbr }}</td></tr>
        </table>
        <p style="font-size:14px;color:#555"><strong>Date :</strong> {{ date }}<br><strong>Lieu :</strong> {{ lieu }}</p>
        <p><a href="{{ url }}" style="display:inline-block;background:#FF7F00;color:#fff;text-decoration:none;padding:10px 20px;border-radius:6px">Voir l'événement</a></p>
        <hr style="border:none;border-top:1px solid #eee;margin:20px 0">
        <p style="font-size:12px;color:#999">Ce message vous a été envoyé via la plateforme AMEEK.</p>
      </td>
    </tr>
  </table>
</body>
</html>
