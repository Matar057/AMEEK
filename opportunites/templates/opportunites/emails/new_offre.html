<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:Arial,sans-serif;background:#f4f4f4;padding:20px;">
<div style="max-width:600px;margin:auto;background:white;border-radius:10px;padding:30px;">
  <h2 style="color:#1e3c72;">{{ type }} — {{ titre }}</h2>
  {% if organisation %}<p style="color:#555;"><strong>Organisation :</strong> {{ organisation }}</p>{% endif %}
  <p style="color:#333;">{{ description|truncatewords:50 }}</p>
  <a href="{{ url }}" style="display:inline-block;background:#1e3c72;color:white;padding:10px 20px;border-radius:5px;text-decoration:none;margin-top:15px;">Voir l'offre</a>
  <hr style="margin-top:30px;border:none;border-top:1px solid #eee;">
  <p style="color:#999;font-size:12px;">AMEEK — Amicale des Étudiants</p>
</div>
</body>
</html>
